<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DayTrack – Redirecting…</title>
  <meta name="description" content="DayTrack – Your daily task and project management app." />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
</head>
<body class="bg-primary d-flex align-items-center justify-content-center min-vh-100">
  <div class="text-center text-white">
    <div class="d-inline-flex align-items-center justify-content-center bg-white rounded-4 mb-3" style="width:72px;height:72px;">
      <i class="bi bi-check2-all text-primary fs-2"></i>
    </div>
    <h1 class="fw-bold fs-3 mb-1">DayTrack</h1>
    <p class="text-white-50" style="font-size:.85rem;">Loading your workspace…</p>
    <div class="spinner-border spinner-border-sm text-white-50 mt-2" role="status" aria-label="Loading">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>
  <script>
    /* Route: if logged in go to dashboard, else go to login */
    const user = localStorage.getItem('daytrack_user');
    setTimeout(() => {
      window.location.href = user
        ? 'frontend/pages/dashboard.html'
        : 'frontend/pages/login.html';
    }, 1200);
  </script>
</body>
</html>
