<!-- ══════════════════════════════════════════════
     DAYTRACK – Shared Bottom Navigation Component
     Include via JS fetch or server-side include
══════════════════════════════════════════════ -->
<nav
  class="position-absolute bottom-0 start-0 end-0 bg-white border-top border-light-subtle px-3 py-2 d-flex justify-content-between align-items-center rounded-bottom-4"
  id="bottom-nav"
  aria-label="Bottom navigation"
>
  <!-- Home -->
  <a href="../pages/dashboard.html" class="btn btn-link d-flex flex-column align-items-center p-0 text-decoration-none nav-link-item" data-page="dashboard">
    <i class="bi bi-house-door fs-5"></i>
    <span style="font-size:.62rem;" class="mt-1">Home</span>
  </a>

  <!-- Tasks -->
  <a href="../pages/tasks.html" class="btn btn-link d-flex flex-column align-items-center p-0 text-decoration-none nav-link-item" data-page="tasks">
    <i class="bi bi-check2-square fs-5"></i>
    <span style="font-size:.62rem;" class="mt-1">Tasks</span>
  </a>

  <!-- Center FAB -->
  <button
    class="btn btn-primary rounded-circle d-flex align-items-center justify-content-center shadow"
    id="nav-fab"
    type="button"
    aria-label="Quick add"
    style="width:52px;height:52px;margin-top:-22px;border:3px solid #fff;"
    onclick="window.location.href='../pages/tasks.html'"
  >
    <i class="bi bi-plus-lg fs-4"></i>
  </button>

  <!-- Meet -->
  <a href="../pages/meet.html" class="btn btn-link d-flex flex-column align-items-center p-0 text-decoration-none nav-link-item" data-page="meet">
    <i class="bi bi-camera-video fs-5"></i>
    <span style="font-size:.62rem;" class="mt-1">Meet</span>
  </a>

  <!-- Inbox / Chat -->
  <a href="../pages/chat.html" class="btn btn-link d-flex flex-column align-items-center p-0 text-decoration-none nav-link-item" data-page="chat">
    <i class="bi bi-envelope fs-5"></i>
    <span style="font-size:.62rem;" class="mt-1">Inbox</span>
  </a>
</nav>

<script>
  /* Auto-highlight active nav link based on current page filename */
  (function () {
    const page = location.pathname.split('/').pop().replace('.html', '');
    document.querySelectorAll('.nav-link-item').forEach(a => {
      const isActive = a.dataset.page === page;
      const icon = a.querySelector('i');
      const lbl = a.querySelector('span');
      
      // Icon: blue when active, gray when inactive
      if (icon) {
        icon.classList.toggle('text-primary', isActive);
        icon.classList.toggle('text-muted', !isActive);
      }
      
      // Label: bold when active, gray when inactive
      if (lbl) {
        lbl.classList.toggle('fw-bold', isActive);
        lbl.classList.toggle('text-muted', !isActive);
      }
    });
  })();
</script>
