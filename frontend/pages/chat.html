<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DayTrack – Chat</title>
  <meta name="description" content="Team chat and messages on DayTrack."/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
</head>
<body class="bg-secondary-subtle d-flex justify-content-center align-items-start min-vh-100 py-4">
<div class="col-12 col-sm-9 col-md-5 col-lg-4 col-xl-3 mx-auto bg-light rounded-4 shadow-lg position-relative d-flex flex-column" id="chat-app" style="max-width:390px;min-height:100vh;overflow:hidden;">

  <!-- ════════════════════ CONVERSATION LIST VIEW ════════════════════ -->
  <div id="list-view" class="d-flex flex-column flex-grow-1" style="padding-bottom:72px;">
    <!-- Header -->
    <div class="p-3 pb-0">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
          <h1 class="fw-bold text-dark fs-4 mb-0">Messages</h1>
          <p class="text-muted mb-0" style="font-size:.78rem;" id="unread-label">Loading…</p>
        </div>
        <button class="btn btn-primary btn-sm rounded-3 fw-semibold d-flex align-items-center gap-1 px-3" id="btn-new-chat" type="button">
          <i class="bi bi-pencil-square"></i> New
        </button>
      </div>

      <!-- Search -->
      <div class="input-group mb-3 bg-white border border-light-subtle rounded-3 px-2 py-1 shadow-sm">
        <span class="input-group-text bg-transparent border-0 text-muted ps-1"><i class="bi bi-search"></i></span>
        <input type="text" class="form-control bg-transparent border-0 shadow-none" id="chat-search" placeholder="Search conversations…" style="font-size:.83rem;" autocomplete="off"/>
        <button class="btn btn-link text-muted p-0 me-1 border-0" id="btn-clear-chat-search" type="button"><i class="bi bi-x-circle"></i></button>
      </div>

      <!-- Tabs -->
      <ul class="nav nav-pills gap-1 mb-3 fw-semibold" id="chat-tabs" style="font-size:.8rem;">
        <li class="nav-item"><button class="nav-link active bg-primary-subtle text-primary rounded-3 px-3 py-1 border-0" data-ctab="all">All</button></li>
        <li class="nav-item"><button class="nav-link text-secondary rounded-3 px-3 py-1 border-0 bg-transparent" data-ctab="direct">Direct</button></li>
        <li class="nav-item"><button class="nav-link text-secondary rounded-3 px-3 py-1 border-0 bg-transparent" data-ctab="groups">Groups</button></li>
        <li class="nav-item"><button class="nav-link text-secondary rounded-3 px-3 py-1 border-0 bg-transparent" data-ctab="unread">Unread</button></li>
      </ul>
    </div>

    <!-- Conversation list -->
    <div class="px-3 overflow-auto flex-grow-1" id="conv-list"></div>
  </div>

  <!-- ════════════════════ CHAT PANEL VIEW ════════════════════ -->
  <div id="chat-panel" class="d-none d-flex flex-column position-absolute top-0 start-0 end-0 bottom-0 bg-light rounded-4" style="z-index:50;">
    <!-- Chat header -->
    <div class="d-flex align-items-center gap-3 p-3 bg-white border-bottom border-light-subtle rounded-top-4 flex-shrink-0">
      <button class="btn btn-link text-muted p-0 border-0 flex-shrink-0" id="btn-back" aria-label="Back" type="button">
        <i class="bi bi-arrow-left fs-5"></i>
      </button>
      <div class="position-relative flex-shrink-0">
        <span class="d-inline-flex align-items-center justify-content-center rounded-circle fw-bold text-white" id="chat-header-avatar" style="width:38px;height:38px;font-size:13px;background:#0d6efd;"></span>
        <span class="position-absolute bottom-0 end-0 rounded-circle border border-2 border-white" id="chat-online-dot" style="width:11px;height:11px;background:#198754;"></span>
      </div>
      <div class="flex-grow-1 overflow-hidden">
        <p class="fw-bold text-dark mb-0 text-truncate" style="font-size:.9rem;" id="chat-header-name">–</p>
        <p class="text-success mb-0" style="font-size:.68rem;" id="chat-header-status">Online</p>
      </div>
      <div class="d-flex gap-1 flex-shrink-0">
        <button class="btn btn-light btn-sm rounded-circle d-flex align-items-center justify-content-center p-0" id="btn-voice-call" style="width:34px;height:34px;" type="button" title="Voice call"><i class="bi bi-telephone-fill text-primary" style="font-size:.8rem;"></i></button>
        <button class="btn btn-light btn-sm rounded-circle d-flex align-items-center justify-content-center p-0" id="btn-video-call" style="width:34px;height:34px;" type="button" title="Video call"><i class="bi bi-camera-video-fill text-primary" style="font-size:.8rem;"></i></button>
        <button class="btn btn-light btn-sm rounded-circle d-flex align-items-center justify-content-center p-0" id="btn-chat-info" style="width:34px;height:34px;" type="button" title="Info"><i class="bi bi-three-dots text-muted" style="font-size:.8rem;"></i></button>
      </div>
    </div>

    <!-- Date divider -->
    <div class="text-center py-2 flex-shrink-0">
      <span class="badge bg-body-tertiary text-muted rounded-pill px-3" style="font-size:.68rem;">Today</span>
    </div>

    <!-- Messages area -->
    <div class="flex-grow-1 overflow-auto px-3 pb-2 d-flex flex-column gap-2" id="messages-area"></div>

    <!-- Typing indicator -->
    <div class="px-3 pb-1 flex-shrink-0 d-none" id="typing-indicator">
      <span class="text-muted" style="font-size:.72rem;" id="typing-text">Alex is typing…</span>
    </div>

    <!-- Input bar -->
    <div class="d-flex align-items-center gap-2 p-3 bg-white border-top border-light-subtle flex-shrink-0">
      <button class="btn btn-light btn-sm rounded-circle d-flex align-items-center justify-content-center flex-shrink-0 p-0" id="btn-attach" type="button" style="width:34px;height:34px;" title="Attach file">
        <i class="bi bi-paperclip text-muted"></i>
      </button>
      <div class="flex-grow-1 input-group bg-body-tertiary border border-light-subtle rounded-pill px-3 py-1">
        <input type="text" class="form-control bg-transparent border-0 shadow-none" id="msg-input" placeholder="Type a message…" style="font-size:.83rem;" autocomplete="off" maxlength="500"/>
      </div>
      <button class="btn btn-light btn-sm rounded-circle d-flex align-items-center justify-content-center flex-shrink-0 p-0" id="btn-emoji" type="button" style="width:34px;height:34px;" title="Emoji">
        <i class="bi bi-emoji-smile text-muted"></i>
      </button>
      <button class="btn btn-primary rounded-circle d-flex align-items-center justify-content-center flex-shrink-0 p-0" id="btn-send" type="button" style="width:38px;height:38px;" title="Send">
        <i class="bi bi-send-fill" style="font-size:.85rem;"></i>
      </button>
    </div>
  </div>

  <!-- ── BOTTOM NAV (Loaded from navbar.html) ── -->
  <div id="navbar-container"></div>
</div>

<!-- ── NEW CHAT MODAL ── -->
<div class="modal fade" id="newChatModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" style="max-width:360px;">
    <div class="modal-content rounded-4 border-0 shadow-lg">
      <div class="modal-header border-0 pb-0">
        <h2 class="modal-title fw-bold text-dark fs-5">New Conversation</h2>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p class="text-muted mb-3" style="font-size:.82rem;">Start a conversation with a team member or create a group.</p>
        <div class="d-flex gap-2 mb-3">
          <button class="btn btn-outline-primary flex-grow-1 rounded-3 fw-semibold" id="btn-direct-chat" type="button"><i class="bi bi-person me-1"></i>Direct</button>
          <button class="btn btn-outline-success flex-grow-1 rounded-3 fw-semibold" id="btn-group-chat" type="button"><i class="bi bi-people me-1"></i>Group</button>
        </div>
        <input type="text" class="form-control rounded-3 border-light-subtle shadow-none mb-3" id="new-chat-name" placeholder="Name or topic…" style="font-size:.85rem;" autocomplete="off"/>
        <button class="btn btn-primary w-100 fw-bold rounded-3 py-2" id="btn-start-chat" type="button"><i class="bi bi-chat-dots me-1"></i> Start Chat</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmBkWd1aRH7/H3N3s3aTr5Lk+7O" crossorigin="anonymous"></script>
<script>
  /* Load navbar component */
  fetch('../components/navbar.html')
    .then(r => r.text())
    .then(html => {
      document.getElementById('navbar-container').innerHTML = html;
    });
</script>
<script src="../../assets/js/daytrack.js"></script>
<script>
  const newChatModal = new bootstrap.Modal(document.getElementById('newChatModal'));
  let activeConvId  = null;
  let activeTab     = 'all';
  let chatSearch    = '';
  let newChatType   = 'direct';

  /* ── Conversation data ── */
  let conversations = [
    { id:1, name:'Design System Team', init:'DS', color:'#f6993f', type:'groups', preview:'Can you review the new icon set?', time:'2m', unread:3, online:true },
    { id:2, name:'Alex Johnson',       init:'AJ', color:'#17a2b8', type:'direct', preview:'Sure, I\'ll send it over ASAP!',   time:'5m', unread:1, online:true },
    { id:3, name:'Marketing Web',      init:'MW', color:'#dc3545', type:'groups', preview:'Campaign goes live tomorrow 🚀',    time:'18m', unread:0, online:false },
    { id:4, name:'Priya Sharma',       init:'PS', color:'#198754', type:'direct', preview:'Thanks for the update 👍',         time:'1h', unread:0, online:true },
    { id:5, name:'Sprint Retro',       init:'SR', color:'#0d6efd', type:'groups', preview:'Meeting notes have been shared',   time:'2h', unread:0, online:false },
    { id:6, name:'David Lee',          init:'DL', color:'#343a40', type:'direct', preview:'Let\'s sync after standup',       time:'3h', unread:0, online:false },
  ];

  /* ── Message data ── */
  const messagesDB = {
    1:[
      {from:'them', name:'Team', text:'Can you review the new icon set?',           time:'9:05 AM'},
      {from:'them', name:'Team', text:'I\'ve attached the Figma link here 👆',      time:'9:06 AM'},
      {from:'me',               text:'On it! I\'ll check in 10 minutes',            time:'9:08 AM'},
      {from:'them', name:'Team', text:'Thanks! Let us know if you have feedback.',  time:'9:09 AM'},
    ],
    2:[
      {from:'them', name:'Alex', text:'Hey, did you see the latest PR?',            time:'9:10 AM'},
      {from:'me',               text:'Yes, looks good to me! Approving now ✅',      time:'9:11 AM'},
      {from:'them', name:'Alex', text:'Sure, I\'ll send it over ASAP!',             time:'9:12 AM'},
    ],
    3:[
      {from:'them', name:'MW',  text:'Campaign is ready to launch!',               time:'10:00 AM'},
      {from:'me',               text:'Great! Let me do a final check.',             time:'10:02 AM'},
      {from:'them', name:'MW',  text:'Campaign goes live tomorrow 🚀',              time:'10:05 AM'},
    ],
  };

  /* ── Emoji shortcuts ── */
  const emojis = ['😊','👍','🎉','🔥','✅','❌','⏰','💡','🚀','👋'];
  let emojiPickerOpen = false;

  function updateUnreadLabel(){
    const total = conversations.reduce((s,c)=>s+c.unread,0);
    document.getElementById('unread-label').textContent = total ? `${total} unread message${total!==1?'s':''}` : 'All caught up ✅';
  }

  function getFiltered(){
    let c = conversations;
    if(activeTab==='direct') c=c.filter(x=>x.type==='direct');
    if(activeTab==='groups') c=c.filter(x=>x.type==='groups');
    if(activeTab==='unread') c=c.filter(x=>x.unread>0);
    if(chatSearch){ const q=chatSearch.toLowerCase(); c=c.filter(x=>x.name.toLowerCase().includes(q)||x.preview.toLowerCase().includes(q)); }
    return c;
  }

  function renderConvList(){
    updateUnreadLabel();
    const list = document.getElementById('conv-list');
    const items = getFiltered();
    if(!items.length){
      list.innerHTML=`<div class="text-center text-muted py-5"><i class="bi bi-chat-square-dots fs-2 d-block mb-2 opacity-50"></i>No conversations found</div>`;
      return;
    }
    list.innerHTML = items.map(c=>`
      <div class="d-flex align-items-center gap-3 px-1 py-2 rounded-3 mb-1 ${c.unread?'bg-primary-subtle':''}" role="button" data-conv-id="${c.id}" style="cursor:pointer;">
        <div class="position-relative flex-shrink-0">
          <span class="d-inline-flex align-items-center justify-content-center rounded-circle fw-bold text-white" style="width:46px;height:46px;background:${c.color};font-size:13px;">${c.init}</span>
          ${c.online?'<span class="position-absolute bottom-0 end-0 bg-success rounded-circle border border-2 border-white" style="width:12px;height:12px;"></span>':''}
        </div>
        <div class="flex-grow-1 overflow-hidden">
          <div class="d-flex justify-content-between align-items-center">
            <p class="${c.unread?'fw-bold':'fw-semibold'} text-dark mb-0" style="font-size:.85rem;">${escHtml(c.name)}</p>
            <span class="text-muted flex-shrink-0 ms-1" style="font-size:.68rem;">${c.time}</span>
          </div>
          <div class="d-flex justify-content-between align-items-center">
            <p class="${c.unread?'fw-medium text-dark':'text-muted'} mb-0 text-truncate" style="font-size:.75rem;max-width:210px;">${escHtml(c.preview)}</p>
            ${c.unread?`<span class="badge bg-primary rounded-circle flex-shrink-0 ms-1 d-flex align-items-center justify-content-center" style="width:20px;height:20px;font-size:.62rem;">${c.unread}</span>`:''}
          </div>
        </div>
      </div>
      <hr class="my-0 border-light-subtle"/>
    `).join('');
  }
  renderConvList();

  /* ── Open chat ── */
  document.getElementById('conv-list').addEventListener('click', e=>{
    const item = e.target.closest('[data-conv-id]');
    if(!item) return;
    openChat(parseInt(item.dataset.convId,10));
  });

  function openChat(id){
    activeConvId = id;
    const c = conversations.find(x=>x.id===id);
    if(!c) return;
    c.unread = 0;
    renderConvList();
    document.getElementById('chat-header-avatar').textContent   = c.init;
    document.getElementById('chat-header-avatar').style.background = c.color;
    document.getElementById('chat-header-name').textContent    = c.name;
    document.getElementById('chat-header-status').textContent  = c.online?'Online':'Offline';
    document.getElementById('chat-header-status').className    = `mb-0 ${c.online?'text-success':'text-muted'}`;
    document.getElementById('chat-online-dot').style.background = c.online?'#198754':'#6c757d';
    renderMessages(id);
    document.getElementById('list-view').classList.add('d-none');
    document.getElementById('chat-panel').classList.remove('d-none');
    document.getElementById('main-bottom-nav').style.display='none';
    document.getElementById('msg-input').focus();
  }

  function renderMessages(id){
    const area = document.getElementById('messages-area');
    const msgs = messagesDB[id]||[];
    if(!msgs.length){
      area.innerHTML=`<div class="text-center text-muted py-5 flex-grow-1"><i class="bi bi-chat fs-2 d-block mb-2 opacity-50"></i>Say hello! 👋</div>`;
      return;
    }
    area.innerHTML = msgs.map(m=>`
      <div class="d-flex ${m.from==='me'?'justify-content-end':'justify-content-start'}">
        <div style="max-width:78%;">
          ${m.from!=='me'&&m.name?`<p class="text-muted mb-1 ms-2" style="font-size:.65rem;">${escHtml(m.name)}</p>`:''}
          <div class="px-3 py-2 rounded-4 shadow-sm ${m.from==='me'?'bg-primary text-white rounded-top-end-0':'bg-white text-dark border border-light-subtle rounded-top-start-0'}" style="font-size:.83rem;word-break:break-word;">
            ${escHtml(m.text)}
          </div>
          <p class="text-muted mt-1 mb-0 ${m.from==='me'?'text-end':''}" style="font-size:.62rem;">${m.time}${m.from==='me'?' · <i class="bi bi-check2-all text-primary"></i>':''}</p>
        </div>
      </div>
    `).join('');
    area.scrollTop = area.scrollHeight;
  }

  /* ── Back ── */
  document.getElementById('btn-back').addEventListener('click', ()=>{
    document.getElementById('list-view').classList.remove('d-none');
    document.getElementById('chat-panel').classList.add('d-none');
    document.getElementById('main-bottom-nav').style.display='';
    emojiPickerOpen=false;
    const ep=document.getElementById('emoji-picker'); if(ep) ep.remove();
  });

  /* ── Send message ── */
  function sendMessage(){
    const inp  = document.getElementById('msg-input');
    const text = inp.value.trim();
    if(!text||!activeConvId) return;
    const now  = new Date();
    const time = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} ${now.getHours()>=12?'PM':'AM'}`;
    if(!messagesDB[activeConvId]) messagesDB[activeConvId]=[];
    messagesDB[activeConvId].push({from:'me',text,time});
    const c = conversations.find(x=>x.id===activeConvId);
    if(c) c.preview = text;
    inp.value='';
    renderMessages(activeConvId);

    /* Typing indicator then auto-reply */
    const ti = document.getElementById('typing-indicator');
    const conv = conversations.find(x=>x.id===activeConvId);
    if(conv&&conv.online){
      document.getElementById('typing-text').textContent = `${conv.name.split(' ')[0]} is typing…`;
      ti.classList.remove('d-none');
      setTimeout(()=>{
        ti.classList.add('d-none');
        const replies=['Got it, thanks! 👍','Sounds good!','Let me check on that.','On it! 🚀','Perfect, I\'ll follow up soon.','Thanks for the update! ✅'];
        const reply = replies[Math.floor(Math.random()*replies.length)];
        messagesDB[activeConvId].push({from:'them',name:conv.name.split(' ')[0],text:reply,time});
        if(conv) conv.preview = reply;
        renderMessages(activeConvId);
      }, 1200+Math.random()*800);
    }
  }
  document.getElementById('btn-send').addEventListener('click', sendMessage);
  document.getElementById('msg-input').addEventListener('keydown', e=>{ if(e.key==='Enter'&&!e.shiftKey) sendMessage(); });

  /* ── Emoji picker ── */
  document.getElementById('btn-emoji').addEventListener('click', ()=>{
    const existing = document.getElementById('emoji-picker');
    if(existing){ existing.remove(); emojiPickerOpen=false; return; }
    emojiPickerOpen=true;
    const picker = document.createElement('div');
    picker.id='emoji-picker';
    picker.className='position-absolute bg-white border border-light-subtle rounded-3 shadow-lg p-2 d-flex flex-wrap gap-1';
    picker.style.cssText='bottom:70px;right:16px;width:200px;z-index:200;';
    picker.innerHTML=emojis.map(e=>`<button class="btn btn-link p-1 border-0 fs-5 emoji-btn" type="button" data-emoji="${e}">${e}</button>`).join('');
    document.getElementById('chat-panel').appendChild(picker);
    picker.querySelectorAll('.emoji-btn').forEach(b=>{
      b.addEventListener('click', ()=>{
        document.getElementById('msg-input').value += b.dataset.emoji;
        document.getElementById('msg-input').focus();
        picker.remove(); emojiPickerOpen=false;
      });
    });
  });

  document.getElementById('btn-attach').addEventListener('click', ()=>showToast('File attachment coming soon 📎','info'));
  document.getElementById('btn-voice-call').addEventListener('click', ()=>{ const c=conversations.find(x=>x.id===activeConvId); showToast(`Calling ${c?.name||''}… 📞`,'info'); });
  document.getElementById('btn-video-call').addEventListener('click', ()=>{ const c=conversations.find(x=>x.id===activeConvId); showToast(`Starting video call with ${c?.name||''}… 🎥`,'info'); window.location.href='meet.html'; });
  document.getElementById('btn-chat-info').addEventListener('click', ()=>showToast('Conversation info coming soon','info'));

  /* ── Filter tabs ── */
  document.getElementById('chat-tabs').addEventListener('click', e=>{
    const btn=e.target.closest('[data-ctab]'); if(!btn) return;
    activeTab=btn.dataset.ctab;
    document.querySelectorAll('[data-ctab]').forEach(b=>{
      const a=b.dataset.ctab===activeTab;
      b.classList.toggle('active',a); b.classList.toggle('bg-primary-subtle',a); b.classList.toggle('text-primary',a); b.classList.toggle('text-secondary',!a);
    });
    renderConvList();
  });

  /* ── Search ── */
  document.getElementById('chat-search').addEventListener('input', e=>{ chatSearch=e.target.value; renderConvList(); });
  document.getElementById('btn-clear-chat-search').addEventListener('click', ()=>{ document.getElementById('chat-search').value=''; chatSearch=''; renderConvList(); });

  /* ── New chat ── */
  document.getElementById('btn-new-chat').addEventListener('click', ()=>newChatModal.show());
  document.getElementById('btn-direct-chat').addEventListener('click', function(){ newChatType='direct'; this.classList.add('btn-primary','text-white'); this.classList.remove('btn-outline-primary'); document.getElementById('btn-group-chat').classList.remove('btn-success','text-white'); document.getElementById('btn-group-chat').classList.add('btn-outline-success'); });
  document.getElementById('btn-group-chat').addEventListener('click', function(){ newChatType='groups'; this.classList.add('btn-success','text-white'); this.classList.remove('btn-outline-success'); document.getElementById('btn-direct-chat').classList.remove('btn-primary','text-white'); document.getElementById('btn-direct-chat').classList.add('btn-outline-primary'); });
  document.getElementById('btn-start-chat').addEventListener('click', ()=>{
    const name=document.getElementById('new-chat-name').value.trim();
    if(!name){ document.getElementById('new-chat-name').classList.add('is-invalid'); setTimeout(()=>document.getElementById('new-chat-name').classList.remove('is-invalid'),1400); return; }
    const init=name.split(' ').map(w=>w[0]).join('').toUpperCase().substring(0,2);
    const colors=['#0d6efd','#198754','#dc3545','#f6993f','#17a2b8','#6f42c1'];
    const newConv={id:Date.now(),name,init,color:colors[Math.floor(Math.random()*colors.length)],type:newChatType,preview:'Say hello! 👋',time:'now',unread:0,online:false};
    conversations.unshift(newConv);
    newChatModal.hide(); document.getElementById('new-chat-name').value='';
    renderConvList();
    showToast(`Chat with ${name} started! 💬`);
    setTimeout(()=>openChat(newConv.id),300);
  });
</script>
</body>
</html>
