<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DayTrack – Sign In</title>
  <meta name="description" content="Sign in to DayTrack to manage your tasks, projects, and meetings."/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
</head>
<body class="bg-primary d-flex justify-content-center align-items-center min-vh-100 py-4">
<div class="col-12 col-sm-9 col-md-5 col-lg-4 col-xl-3 mx-auto" style="max-width:390px;">

  <!-- ── BRAND HERO ── -->
  <div class="text-center mb-4">
    <div class="d-inline-flex align-items-center justify-content-center bg-white rounded-4 mb-3 shadow" style="width:72px;height:72px;">
      <i class="bi bi-check2-all text-primary fs-2"></i>
    </div>
    <h1 class="fw-bold text-white fs-2 mb-1">DayTrack</h1>
    <p class="text-white-50" style="font-size:.85rem;">Your daily productivity companion</p>
  </div>

  <!-- ── LOGIN CARD ── -->
  <div class="bg-light rounded-4 shadow-lg p-4 mb-3">
    <h2 class="fw-bold text-dark fs-5 mb-1">Welcome back 👋</h2>
    <p class="text-muted mb-4" style="font-size:.8rem;">Sign in to continue to DayTrack</p>

    <!-- Demo hint -->
    <div class="alert alert-info rounded-3 py-2 mb-3 d-flex align-items-center gap-2" style="font-size:.78rem;">
      <i class="bi bi-info-circle-fill text-info flex-shrink-0"></i>
      <span>Demo: <strong>rian@demo.com</strong> / <strong>password123</strong></span>
    </div>

    <form id="login-form" novalidate>
      <!-- Email -->
      <div class="mb-3">
        <label class="form-label fw-semibold text-dark" style="font-size:.82rem;">Email Address</label>
        <div class="input-group">
          <span class="input-group-text bg-primary-subtle border-0 text-primary"><i class="bi bi-envelope-fill"></i></span>
          <input type="email" class="form-control border-start-0 bg-primary-subtle border-0 shadow-none" id="email" placeholder="rian@demo.com" required autocomplete="email" style="font-size:.85rem;"/>
          <div class="invalid-feedback">Please enter a valid email.</div>
        </div>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <div class="d-flex justify-content-between align-items-center mb-1">
          <label class="form-label fw-semibold text-dark mb-0" style="font-size:.82rem;">Password</label>
          <button type="button" class="btn btn-link text-primary p-0 border-0 text-decoration-none" style="font-size:.75rem;" id="btn-forgot">Forgot password?</button>
        </div>
        <div class="input-group">
          <span class="input-group-text bg-primary-subtle border-0 text-primary"><i class="bi bi-lock-fill"></i></span>
          <input type="password" class="form-control border-start-0 bg-primary-subtle border-0 shadow-none" id="password" placeholder="••••••••" required autocomplete="current-password" style="font-size:.85rem;"/>
          <button class="btn bg-primary-subtle border-0 text-muted" type="button" id="toggle-password" aria-label="Show password">
            <i class="bi bi-eye" id="eye-icon"></i>
          </button>
          <div class="invalid-feedback">Password is required.</div>
        </div>
      </div>

      <!-- Remember -->
      <div class="form-check mb-4">
        <input class="form-check-input" type="checkbox" id="remember-me"/>
        <label class="form-check-label text-muted" for="remember-me" style="font-size:.8rem;">Remember me for 30 days</label>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn btn-primary w-100 fw-bold rounded-3 py-2 mb-3 d-flex align-items-center justify-content-center gap-2" id="btn-login">
        <span id="btn-login-text">Sign In</span>
        <span id="btn-login-spinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
      </button>

      <!-- Error alert -->
      <div class="alert alert-danger rounded-3 d-none py-2 d-flex align-items-center gap-2" id="login-error" role="alert" style="font-size:.8rem;">
        <i class="bi bi-exclamation-triangle-fill text-danger flex-shrink-0"></i>
        <span id="login-error-msg">Invalid email or password.</span>
      </div>
    </form>
  </div>

  <!-- ── DIVIDER ── -->
  <div class="d-flex align-items-center gap-2 mb-3">
    <hr class="flex-grow-1 border-white border-opacity-25"/>
    <span class="text-white-50" style="font-size:.75rem;">or continue with</span>
    <hr class="flex-grow-1 border-white border-opacity-25"/>
  </div>

  <!-- ── SOCIAL ── -->
  <div class="d-flex gap-2 mb-4">
    <button class="btn bg-white flex-grow-1 rounded-3 fw-semibold d-flex align-items-center justify-content-center gap-2 shadow-sm" id="btn-google" style="font-size:.82rem;" type="button">
      <i class="bi bi-google text-danger"></i> Google
    </button>
    <button class="btn bg-white flex-grow-1 rounded-3 fw-semibold d-flex align-items-center justify-content-center gap-2 shadow-sm" id="btn-github" style="font-size:.82rem;" type="button">
      <i class="bi bi-github text-dark"></i> GitHub
    </button>
  </div>

  <!-- ── REGISTER LINK ── -->
  <p class="text-center text-white-50 mb-0" style="font-size:.8rem;">
    Don't have an account?
    <a href="#" class="text-white fw-bold text-decoration-none" id="btn-register">Create one free</a>
  </p>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmBkWd1aRH7/H3N3s3aTr5Lk+7O" crossorigin="anonymous"></script>
<script>
  /* If already logged in, redirect */
  if(localStorage.getItem('daytrack_user')) window.location.href='dashboard.html';

  /* Show/hide password */
  document.getElementById('toggle-password').addEventListener('click', function(){
    const inp=document.getElementById('password'); const ico=document.getElementById('eye-icon');
    if(inp.type==='password'){ inp.type='text'; ico.className='bi bi-eye-slash'; }
    else{ inp.type='password'; ico.className='bi bi-eye'; }
  });

  /* Login submit */
  document.getElementById('login-form').addEventListener('submit', function(e){
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('btn-login');
    const spinner  = document.getElementById('btn-login-spinner');
    const errBox   = document.getElementById('login-error');
    const errMsg   = document.getElementById('login-error-msg');

    errBox.classList.add('d-none');
    if(!this.checkValidity()){ this.classList.add('was-validated'); return; }

    btn.disabled=true; spinner.classList.remove('d-none');
    document.getElementById('btn-login-text').textContent='Signing in…';

    setTimeout(()=>{
      btn.disabled=false; spinner.classList.add('d-none');
      document.getElementById('btn-login-text').textContent='Sign In';

      /* Demo: accept rian@demo.com / password123 OR any@email.com / pass */
      if((email==='rian@demo.com'&&password==='password123')||(email.includes('@')&&password.length>=6)){
        const name = email==='rian@demo.com' ? 'Rian Pratama' : email.split('@')[0].charAt(0).toUpperCase()+email.split('@')[0].slice(1);
        localStorage.setItem('daytrack_user', JSON.stringify({name,email,role:'Team Member',bio:''}));
        window.location.href='dashboard.html';
      } else {
        errBox.classList.remove('d-none');
        errMsg.textContent='Invalid credentials. Use rian@demo.com / password123 or any email with 6+ char password.';
        this.classList.add('was-validated');
      }
    },1200);
  });

  /* Social & register */
  ['btn-google','btn-github'].forEach(id=>{
    document.getElementById(id).addEventListener('click', ()=>{
      const mock = {name:'Demo User',email:'demo@social.com',role:'Member',bio:''};
      localStorage.setItem('daytrack_user',JSON.stringify(mock));
      window.location.href='dashboard.html';
    });
  });

  document.getElementById('btn-forgot').addEventListener('click', ()=>alert('Password reset link sent to your email! (demo)'));
  document.getElementById('btn-register').addEventListener('click', ()=>alert('Registration form coming soon! Use demo credentials for now.'));
</script>
</body>
</html>
